version: '3.8'

services:
  db:
    image: postgres:15
    container_name: dj_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dj_admin
      POSTGRES_PASSWORD: dj_password
      POSTGRES_DB: dj_hub
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: dj_hub_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /Users/patrickwisniewski/Dokumente/DJ Rick/Playlists:/playlists:ro
    environment:
      - DB_HOST=db
      - DB_USER=dj_admin
      - DB_PASS=dj_password
      - DB_NAME=dj_hub
      - DB_PORT=5432
      - PORT=5000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dj_hub_frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.178.81:5000
    depends_on:
      - backend
